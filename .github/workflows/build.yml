name: Build & Deploy Aliucord Plugin

on:
  push:
    branches:
      - main
      - 'builds*'    # match any branch starting with "builds"
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository with full history
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0      # ensures all branches and tags are available

      # 2️⃣ Setup Java (Aliucord requires Java 17+)
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'

      # 3️⃣ Fetch all branches and tags safely
      - name: Fetch all branches & tags
        run: |
          git fetch origin '+refs/heads/*:refs/remotes/origin/*' --tags || git fetch --all
          git fetch origin '+refs/tags/*:refs/tags/*' --tags || echo "No tags to fetch"
          git branch -a   # debug: list all available branches

      # 4️⃣ Checkout the correct branch
      - name: Checkout branch
        run: |
          TARGET_BRANCH=${GITHUB_REF##*/}
          git checkout $TARGET_BRANCH || git checkout main

      # 5️⃣ Build plugin
      - name: Build plugin
        run: ./gradlew build

      # 6️⃣ Optional: Deploy plugin (if using Aliucord deploy scripts)
      # - name: Deploy plugin
      #   run: ./gradlew deploy
