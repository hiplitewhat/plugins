name: Build

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Plugins
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build project and save logs
        run: |
          ./gradlew make --no-daemon --stacktrace --info 2>&1 | tee gradle.log

      - name: Extract errors from log
        if: always()
        run: |
          echo "Checking for errors..."
          grep -i "error" gradle.log || echo "No errors detected."

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: gradle-logs
          path: gradle.log

      - name: Upload plugin artifacts
        if: success()
        uses: actions/upload-artifact@v6
        with:
          name: plugins
          if-no-files-found: error
          path: plugins/**/build/outputs/*.zip
